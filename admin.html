<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin · HuynhProduct</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f2;--border:rgba(0,0,0,.09);
  --acc:#6B5CE7;--acc2:#5548d9;--ink:#111;--ink2:rgba(0,0,0,.6);
  --ink3:rgba(0,0,0,.35);--red:#dc2626;--green:#16a34a;
  --ff:'Inter',system-ui,sans-serif;
}
body{font-family:var(--ff);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* nav */
#anav{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.anav-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--ink)}
.anav-logo img{height:26px;width:auto;filter:brightness(0)}
.anav-badge{font-size:10px;font-weight:600;background:rgba(107,92,231,.1);color:var(--acc2);
  border:1px solid rgba(107,92,231,.25);padding:3px 10px;border-radius:100px;letter-spacing:.06em}
.anav-right{display:flex;align-items:center;gap:10px}
.anav-visit{font-size:13px;color:var(--ink3);text-decoration:none;transition:color .15s}
.anav-visit:hover{color:var(--ink)}
/* main area */
#alayout{display:flex;flex:1;overflow:hidden}
/* sidebar */
#aside{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 10px}
.atab{width:100%;text-align:left;background:none;border:none;color:var(--ink2);
  font-family:var(--ff);font-size:13.5px;font-weight:500;padding:10px 14px;border-radius:8px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px;margin-bottom:3px}
.atab svg{opacity:.5;flex-shrink:0}
.atab:hover{background:rgba(0,0,0,.05);color:var(--ink)}
.atab.active{background:rgba(107,92,231,.12);color:var(--acc2);font-weight:600}
.atab.active svg{opacity:1}
.aside-gap{flex:1}
#seed-btn{width:100%;padding:9px;background:rgba(0,0,0,.04);border:1px solid var(--border);
  border-radius:8px;color:var(--ink3);font-size:12px;font-family:var(--ff);cursor:pointer;
  transition:all .15s;margin-top:8px}
#seed-btn:hover{background:rgba(107,92,231,.08);color:var(--acc2);border-color:rgba(107,92,231,.3)}
/* main */
#amain{flex:1;overflow:hidden;display:flex;position:relative}
#list-view{flex:1;overflow-y:auto;padding:24px 28px}
.list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.list-hdr h2{font-size:20px;font-weight:700;letter-spacing:-.02em}
.btn-add{background:var(--acc);color:#fff;border:none;padding:9px 18px;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff);display:flex;align-items:center;gap:6px;transition:opacity .15s}
.btn-add:hover{opacity:.85}
/* item cards */
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;
  transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.item-card:hover{border-color:rgba(107,92,231,.4);box-shadow:0 0 0 2px rgba(107,92,231,.12)}
.item-thumb{width:52px;height:40px;border-radius:7px;background:var(--bg3);flex-shrink:0;
  overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:12px;color:var(--ink3)}
.item-badge{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600;flex-shrink:0}
.badge-detail{background:rgba(107,92,231,.2);color:var(--acc2)}
.badge-link{background:rgba(34,197,94,.15);color:#4ade80}
.badge-soon{background:rgba(255,255,255,.07);color:var(--ink3)}
.item-actions{display:flex;gap:6px;flex-shrink:0}
.btn-edit{background:rgba(107,92,231,.08);border:1px solid rgba(107,92,231,.15);color:var(--acc2);padding:6px 12px;
  border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--ff);transition:all .15s}
.btn-edit:hover{background:rgba(107,92,231,.15);border-color:rgba(107,92,231,.3)}
.btn-del{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.15);color:#dc2626;padding:6px 10px;
  border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--ff);transition:all .15s}
.btn-del:hover{background:rgba(220,38,38,.12)}
.drag-handle{color:var(--ink3);cursor:grab;font-size:14px;flex-shrink:0;user-select:none;padding:0 4px}
/* ── EDIT PANEL ── */
#edit-panel{position:absolute;top:0;right:0;bottom:0;width:560px;background:var(--bg2);
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);z-index:10}
#edit-panel.open{transform:translateX(0)}
.ep-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ep-hdr h3{font-size:16px;font-weight:700}
.ep-close{background:none;border:none;color:var(--ink3);font-size:20px;cursor:pointer;padding:4px;
  line-height:1;transition:color .15s}
.ep-close:hover{color:var(--ink)}
.ep-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.ep-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink3);
  font-family:var(--ff);font-size:13px;font-weight:500;padding:10px 18px;cursor:pointer;
  margin-bottom:-1px;transition:all .15s}
.ep-tab:hover{color:var(--ink)}
.ep-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.ep-body{flex:1;overflow-y:auto;padding:20px}
.ep-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;gap:10px}
/* ── FORM ELEMENTS ── */
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--ink3);margin-bottom:6px}
.field input,.field textarea,.field select{
  width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;
  color:var(--ink);font-family:var(--ff);font-size:13.5px;padding:9px 12px;
  outline:none;transition:border-color .15s;resize:vertical;
  box-shadow:0 1px 2px rgba(0,0,0,.04)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(107,92,231,.5);box-shadow:0 0 0 3px rgba(107,92,231,.1)}
.field select option{background:#fff}
.field textarea{min-height:80px;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.hint{font-size:11px;color:var(--ink3);margin-top:4px}
/* radio group */
.radio-grp{display:flex;gap:8px;flex-wrap:wrap}
.radio-opt{position:relative}
.radio-opt input{position:absolute;opacity:0;pointer-events:none}
.radio-opt label{display:flex;align-items:center;gap:6px;background:#fff;
  border:1.5px solid var(--border);border-radius:8px;padding:7px 13px;font-size:13px;
  font-weight:500;cursor:pointer;transition:all .15s;color:var(--ink2)}
.radio-opt input:checked + label{border-color:var(--acc);background:rgba(107,92,231,.08);color:var(--acc)}
/* toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;
  background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.toggle-row span{font-size:13px;color:var(--ink2)}
.toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:rgba(0,0,0,.15);border-radius:100px;
  cursor:pointer;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;
  background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked + .toggle-slider{background:var(--acc)}
.toggle input:checked + .toggle-slider::before{transform:translateX(16px)}
/* image upload */
.img-upload-area{border:1.5px dashed rgba(0,0,0,.15);border-radius:10px;padding:20px;
  text-align:center;cursor:pointer;transition:border-color .15s;position:relative;background:#fafafa}
.img-upload-area:hover,.img-upload-area.drag{border-color:var(--acc);background:rgba(107,92,231,.04)}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-preview{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;display:block;margin-top:10px}
/* kv repeater */
.kv-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.kv-row{display:grid;grid-template-columns:1fr 1.5fr auto;gap:6px;align-items:center}
.kv-row input{padding:7px 10px;font-size:13px}
.btn-rm{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.15);color:#dc2626;width:28px;height:28px;
  border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.btn-rm:hover{background:rgba(220,38,38,.15)}
.btn-add-row{background:transparent;border:1.5px dashed rgba(0,0,0,.15);color:var(--ink3);
  font-size:12px;font-family:var(--ff);padding:6px 12px;border-radius:6px;cursor:pointer;
  width:100%;transition:all .15s}
.btn-add-row:hover{border-color:var(--acc);color:var(--acc)}
/* sections builder */
.sec-list{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.sec-block{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sec-block-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg3);cursor:pointer}
.sec-block-hdr .sec-type-badge{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;background:rgba(107,92,231,.1);color:var(--acc);padding:2px 8px;border-radius:4px;border:1px solid rgba(107,92,231,.2)}
.sec-block-hdr .sec-heading-preview{font-size:12px;color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-block-body{padding:12px}
.sec-block-body .field{margin-bottom:10px}
.sec-block-body .field:last-child{margin-bottom:0}
.sec-btns{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.sec-btn{background:rgba(0,0,0,.05);border:1px solid var(--border);color:var(--ink3);width:26px;height:26px;
  border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:all .15s}
.sec-btn:hover{background:rgba(0,0,0,.1);color:var(--ink)}
.sec-btn.del:hover{background:rgba(220,38,38,.1);color:#dc2626;border-color:rgba(220,38,38,.2)}
.sec-collapsed .sec-block-body{display:none}
.add-sec-row{display:flex;gap:6px;flex-wrap:wrap}
.add-sec-btn{background:rgba(107,92,231,.07);border:1px solid rgba(107,92,231,.2);
  color:var(--acc);font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:6px;
  cursor:pointer;font-family:var(--ff);transition:all .15s}
.add-sec-btn:hover{background:rgba(107,92,231,.15)}
/* buttons */
.btn-save{background:var(--acc);color:#fff;border:none;padding:10px 22px;border-radius:8px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:opacity .15s}
.btn-save:hover{opacity:.85}
.btn-save:disabled{opacity:.45;cursor:default}
.btn-cancel{background:rgba(0,0,0,.05);color:var(--ink2);border:1px solid var(--border);padding:10px 18px;
  border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--ff);transition:all .15s}
.btn-cancel:hover{background:rgba(0,0,0,.09)}
.btn-danger{background:rgba(220,38,38,.06);color:#dc2626;border:1px solid rgba(220,38,38,.2);
  padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--ff);transition:all .15s}
.btn-danger:hover{background:rgba(220,38,38,.12)}
/* color swatch */
.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type=color]{width:36px;height:36px;border:1px solid var(--border);
  border-radius:6px;padding:2px;background:#fff;cursor:pointer}
.color-row input[type=text]{flex:1}
/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 20px;
  font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.12);color:var(--ink)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(22,163,74,.4);color:#16a34a}
#toast.err{border-color:rgba(220,38,38,.4);color:#dc2626}
.init-spinner{width:32px;height:32px;border:3px solid rgba(107,92,231,.2);
  border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px}
.items-group-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--ink3);margin:20px 0 8px;padding-left:4px}
.items-group-label:first-child{margin-top:0}
.subfield{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.subfield-hdr{font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.items-list-edit{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.items-list-edit input{padding:6px 10px;font-size:13px}
.color-preview{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
/* ── PAGE CONTENT EDITOR ── */
.pc-form{padding:0 0 40px}
.pc-section{margin-bottom:28px}
.pc-section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:14px}
.rpt-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:grid;gap:7px;position:relative}
.rpt-item .rpt-rm{position:absolute;top:8px;right:8px;background:none;border:1px solid var(--border);border-radius:5px;color:var(--ink3);font-size:11px;padding:2px 7px;cursor:pointer;line-height:1.5}
.rpt-item .rpt-rm:hover{background:rgba(220,38,38,.08);color:var(--red);border-color:rgba(220,38,38,.3)}
.btn-add-rpt{width:100%;padding:8px;background:none;border:1.5px dashed var(--border);border-radius:8px;color:var(--ink3);font-size:12.5px;font-family:var(--ff);cursor:pointer;transition:all .15s;margin-top:2px}
.btn-add-rpt:hover{border-color:var(--acc);color:var(--acc);background:rgba(107,92,231,.04)}
.btn-save-pc{padding:11px 28px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:8px}
.btn-save-pc:hover{background:var(--acc2)}
.btn-save-pc:disabled{opacity:.5;cursor:not-allowed}
.pc-feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.pc-feat-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:grid;gap:6px}
.pc-feat-card label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);display:block;margin-bottom:1px}
</style>
</head>
<body>
<div id="app">
  <nav id="anav">
    <div class="anav-logo">
      <img src="logo.svg" alt="">
      <span>HuynhProduct</span>
      <span class="anav-badge">ADMIN</span>
    </div>
    <div class="anav-right">
      <a href="/" target="_blank" class="anav-visit">Visit site ↗</a>
    </div>
  </nav>

  <div id="alayout">
    <aside id="aside">
      <button class="atab active" data-tab="experience" onclick="switchTab('experience')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Experience
      </button>
      <button class="atab" data-tab="products" onclick="switchTab('products')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/></svg>
        My Products
      </button>
      <button class="atab" data-tab="cases" onclick="switchTab('cases')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        Case Studies
      </button>
      <button class="atab" data-tab="pm" onclick="switchTab('pm')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        PM Topics
      </button>
      <div style="height:1px;background:var(--border);margin:10px 4px"></div>
      <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);padding:4px 14px 6px">Page Content</p>
      <button class="atab" data-tab="home" onclick="switchTab('home')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <button class="atab" data-tab="about" onclick="switchTab('about')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        About
      </button>
      <button class="atab" data-tab="podcast" onclick="switchTab('podcast')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="11" r="3"/><path d="M12 20c-5 0-9-4-9-9s4-9 9-9 9 4 9 9"/><path d="M12 14v8M8 22h8"/></svg>
        Podcast
      </button>
      <div class="aside-gap"></div>
      <button id="seed-btn" onclick="seedData()">⚡ Seed initial data</button>
    </aside>

    <main id="amain">
      <div id="list-view">
        <div class="list-hdr">
          <h2 id="list-title">Experience</h2>
          <button class="btn-add" id="add-btn" onclick="openNew()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Add New
          </button>
        </div>
        <div id="items-list"></div>
      </div>

      <div id="edit-panel">
        <div class="ep-hdr">
          <h3 id="ep-title">New Project</h3>
          <button class="ep-close" onclick="closePanel()">✕</button>
        </div>
        <div class="ep-tabs" id="ep-tabs"></div>
        <div class="ep-body" id="ep-body"></div>
        <div class="ep-foot">
          <button class="btn-cancel" onclick="closePanel()">Cancel</button>
          <div style="display:flex;gap:8px;margin-left:auto">
            <button class="btn-danger" id="del-btn" onclick="deleteItem()" style="display:none">Delete</button>
            <button class="btn-save" id="save-btn" onclick="saveItem()">Save changes</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast"></div>

const PAGE_CONTENT_TABS=['home','about','podcast'];

async function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.atab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const titles={experience:'Experience',products:'My Products',cases:'Case Studies',pm:'PM Topics',home:'Home Page',about:'About Page',podcast:'Podcast Page'};
  document.getElementById('list-title').textContent=titles[tab]||tab;
  const isPageTab=PAGE_CONTENT_TABS.includes(tab);
  document.getElementById('add-btn').style.display=isPageTab?'none':'';

  if(isPageTab){await loadPageContentTab(tab);}
  else{await loadTab(tab);}
}

async function loadPageContentTab(tab){
  document.getElementById('items-list').innerHTML='<div class="empty-state"><div class="init-spinner" style="margin:0 auto 12px"></div></div>';
  try{
    const {data,error}=await sb.from('page_content').select('*').eq('page',tab).maybeSingle();
    if(error)throw error;
    _pcItem=data;
    /* Merge saved data over defaults so fields are never empty on first visit */
    const def=PAGE_DEFAULTS[tab]||{};
    const saved=data?.content||{};
    const c={...def,...saved};
    /* For arrays, use saved version if it exists and is non-empty, else use defaults */
    if(tab==='home'){
      c.pills=saved.pills?.length?saved.pills:def.pills;
      c.ticker=saved.ticker?.length?saved.ticker:def.ticker;
      c.features=saved.features?.length?saved.features:def.features;
    }
    if(tab==='about'){c.achievements=saved.achievements?.length?saved.achievements:def.achievements;}
    if(tab==='podcast'){c.episodes=saved.episodes?.length?saved.episodes:def.episodes;}
    document.getElementById('items-list').innerHTML=
      tab==='home'?homeContentForm(c):
      tab==='about'?aboutContentForm(c):
      podcastContentForm(c);
    if(tab==='home'){renderPills(c.pills||[]);renderTicker(c.ticker||[]);}
    if(tab==='about')renderAchievements(c.achievements||[]);
    if(tab==='podcast')renderEpisodes(c.episodes||[]);
  }catch(e){
    toast('Load failed: '+e.message,'err');
    document.getElementById('items-list').innerHTML=`<div class="empty-state">${e.message}</div>`;
  }
}

async function savePageContent(){
  const btn=document.getElementById('save-pc-btn');
  btn.disabled=true;btn.textContent='Saving…';
  try{
    const content=collectPageContent(activeTab);
    let result;
    if(_pcItem){
      result=await sb.from('page_content').update({content}).eq('id',_pcItem.id);
    }else{
      result=await sb.from('page_content').upsert({page:activeTab,content},{onConflict:'page'});
    }
    if(result?.error)throw result.error;
    toast('Saved ✓','ok');
    await loadPageContentTab(activeTab);
  }catch(e){toast('Save failed: '+e.message,'err');}
  btn.disabled=false;btn.textContent='Save changes';
}

function collectPageContent(tab){
  const v=id=>{const el=document.getElementById(id);return el?el.value.trim():'';}
  if(tab==='home'){
    return{
      hero_sub:v('hm-hero-sub'),
      about_title:v('hm-about-title'),
      about_p1:v('hm-about-p1'),
      about_p2:v('hm-about-p2'),
      pills:collectPills(),
      ticker:collectTicker(),
      features_heading:v('hm-feat-heading'),
      features_desc:v('hm-feat-desc'),
      features:[0,1,2,3,4,5].map(i=>({title:v(`hm-ft-${i}`),desc:v(`hm-fd-${i}`)})),
      scroll_desc:v('hm-scroll-desc'),
      cta_eyebrow:v('hm-cta-ey'),
      cta_heading:v('hm-cta-h'),
      cta_desc:v('hm-cta-p'),
    };
  }
  if(tab==='about'){
    return{
      badge:v('ab-badge'),
      h1_name:v('ab-h1name'),
      hero_sub:v('ab-hero-sub'),
      bio_title:v('ab-bio-title'),
      p1:v('ab-p1'),p2:v('ab-p2'),p3:v('ab-p3'),p4:v('ab-p4'),
      achievements:collectAchievements(),
    };
  }
  if(tab==='podcast'){
    return{
      badge:v('pc-badge'),
      heading:v('pc-heading'),
      sub:v('pc-sub'),
      episodes:collectEpisodes(),
    };
  }
  return{};
}

function _drawEpisodes(){
  const list=document.getElementById('episodes-list');
  if(!list)return;
  const colorOpts=['c1','c2','c3','c4','c5','c6'].map(c=>`<option value="${c}">${c}</option>`).join('');
  list.innerHTML=_episodes.map((e,i)=>`
    <div class="rpt-item" style="grid-template-columns:1fr">
      <button class="rpt-rm" onclick="removeEpisode(${i})">✕</button>
      <div class="field-row">
        <div class="field"><label>Episode label</label><input value="${esc(e.num||'')}" placeholder="Episode 01" oninput="_episodes[${i}].num=this.value"></div>
        <div class="field"><label>Icon (emoji)</label><input value="${esc(e.icon||'🎙️')}" placeholder="🎙️" oninput="_episodes[${i}].icon=this.value" style="max-width:80px"></div>
        <div class="field"><label>Color class</label><select onchange="_episodes[${i}].color_cls=this.value">${['c1','c2','c3','c4','c5','c6'].map(c=>`<option value="${c}"${e.color_cls===c?' selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Title</label><input value="${esc(e.title||'')}" oninput="_episodes[${i}].title=this.value"></div>
      <div class="field"><label>Link URL</label><input value="${esc(e.link||'')}" placeholder="https://…" oninput="_episodes[${i}].link=this.value"></div>
    </div>`).join('');
}
function addEpisode(){_episodes.push({num:'',title:'',link:'',icon:'🎙️',color_cls:'c1'});_drawEpisodes();}
function removeEpisode(i){_episodes.splice(i,1);_drawEpisodes();}
function collectEpisodes(){return _episodes;}

async function loadTab(tab){
  document.getElementById('items-list').innerHTML='<div class="empty-state"><div class="init-spinner" style="margin:0 auto 12px"></div></div>';
  const table=tab==='cases'?'case_studies':tab==='pm'?'pm_topics':'projects';
  let q=sb.from(table).select('*');
  if(tab==='experience'||tab==='products') q=q.eq('page',tab);
  q=q.order(tab==='experience'||tab==='products'?'group_order':'sort_order').order('sort_order');
  const {data,error}=await q;
  if(error){toast('Failed to load: '+error.message,'err');return;}
  items=data||[];
  renderList();
}

/* ── LIST RENDER ── */
function renderList(){
  const container=document.getElementById('items-list');
  if(!items.length){container.innerHTML='<div class="empty-state">No items yet. Click "Add New" to get started.</div>';return;}

  if(activeTab==='experience'||activeTab==='products'){
    const groups=new Map();
    items.forEach(p=>{
      if(!groups.has(p.company_group))groups.set(p.company_group,[]);
      groups.get(p.company_group).push(p);
    });
    let html='';
    groups.forEach((ps,name)=>{
      html+=`<div class="items-group-label">${esc(name)}</div>`;
      ps.forEach(p=>{ html+=projectCard(p); });
    });
    container.innerHTML=html;
  } else if(activeTab==='cases'){
    container.innerHTML=items.map(c=>caseCard(c)).join('');
  } else if(activeTab==='pm'){
    container.innerHTML=items.map(t=>pmCard(t)).join('');
  }
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function projectCard(p){
  const thumb=p.cover_url?`<img src="${p.cover_url}" alt="">`:'📦';
  const badge=p.has_detail?`<span class="item-badge badge-detail">Detail page</span>`:
    p.ext_link?`<span class="item-badge badge-link">External link</span>`:
    `<span class="item-badge badge-soon">Coming soon</span>`;
  return `<div class="item-card">
    <div class="drag-handle">⠿</div>
    <div class="item-thumb">${thumb}</div>
    <div class="item-info">
      <div class="item-title">${esc(p.title)}</div>
      <div class="item-sub">${esc(p.company_group)} · ${esc(p.pill_text)}</div>
    </div>
    ${badge}
    <div class="item-actions">
      <button class="btn-edit" onclick="openEdit('${p.id}')">Edit</button>
      <button class="btn-del" onclick="confirmDelete('${p.id}')">✕</button>
    </div>
  </div>`;
}

function caseCard(c){
  const colors={f:'#7c3aed',e:'#059669',s:'#2563eb',t:'#0891b2'};
  const dot=`<div style="width:100%;height:100%;background:radial-gradient(circle at 50% 0%,${colors[c.color_cls]||'#7c3aed'} 0%,transparent 70%)"></div>`;
  return `<div class="item-card">
    <div class="drag-handle">⠿</div>
    <div class="item-thumb">${dot}</div>
    <div class="item-info">
      <div class="item-title">${esc(c.title)}</div>
      <div class="item-sub">${esc(c.tag)}</div>
    </div>
    <div class="item-actions">
      <button class="btn-edit" onclick="openEdit('${c.id}')">Edit</button>
      <button class="btn-del" onclick="confirmDelete('${c.id}')">✕</button>
    </div>
  </div>`;
}

function pmCard(t){
  return `<div class="item-card">
    <div class="drag-handle">⠿</div>
    <div class="item-thumb" style="font-size:14px">${t.icon_svg?'<svg-ico>':'📋'}</div>
    <div class="item-info">
      <div class="item-title">${esc(t.title)}</div>
      <div class="item-sub">${(t.items||[]).slice(0,3).map(esc).join(' · ')}</div>
    </div>
    <div class="item-actions">
      <button class="btn-edit" onclick="openEdit('${t.id}')">Edit</button>
      <button class="btn-del" onclick="confirmDelete('${t.id}')">✕</button>
    </div>
  </div>`;
}

/* ── OPEN / CLOSE PANEL ── */
function openNew(){
  editItem=null;
  editSections=[];
  document.getElementById('ep-title').textContent='New '+(activeTab==='experience'?'Project':activeTab==='products'?'Product':activeTab==='cases'?'Case Study':'PM Topic');
  document.getElementById('del-btn').style.display='none';
  document.getElementById('save-btn').textContent='Create';
  renderForm(null);
  document.getElementById('edit-panel').classList.add('open');
}

function openEdit(id){
  editItem=items.find(i=>i.id===id);
  if(!editItem)return;
  editSections=JSON.parse(JSON.stringify(editItem.d_sections||[]));
  document.getElementById('ep-title').textContent='Edit: '+editItem.title;
  document.getElementById('del-btn').style.display='block';
  document.getElementById('save-btn').textContent='Save changes';
  renderForm(editItem);
  document.getElementById('edit-panel').classList.add('open');
}

function closePanel(){
  document.getElementById('edit-panel').classList.remove('open');
  editItem=null;editSections=[];
}

/* ── FORM RENDERING ── */
function renderForm(item){
  const tabs=document.getElementById('ep-tabs');
  const body=document.getElementById('ep-body');

  if(activeTab==='experience'||activeTab==='products'){
    tabs.innerHTML=`
      <button class="ep-tab active" onclick="showFormTab('card',this)">Card Info</button>
      <button class="ep-tab" onclick="showFormTab('detail',this)">Detail Page</button>`;
    body.innerHTML=`
      <div id="ftab-card">${projectCardForm(item)}</div>
      <div id="ftab-detail" style="display:none">${projectDetailForm(item)}</div>`;
    setupImageUpload(item);
  } else if(activeTab==='cases'){
    tabs.innerHTML='';
    body.innerHTML=caseForm(item);
  } else if(activeTab==='pm'){
    tabs.innerHTML='';
    body.innerHTML=pmForm(item);
  }
}

function showFormTab(tab,btn){
  document.querySelectorAll('#ep-tabs .ep-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ftab-card').style.display=tab==='card'?'':'none';
  document.getElementById('ftab-detail').style.display=tab==='detail'?'':'none';
}

/* ── SECTIONS BUILDER ── */
function initSections(){
  renderSections();
}

function renderSections(){
  const list=document.getElementById('sec-list');
  if(!list)return;
  list.innerHTML=editSections.map((s,i)=>sectionBlock(s,i)).join('');
}

function sectionBlock(s,i){
  const types={text:'Text',bullets:'Bullets',quote:'Quote','two-cards':'Two Cards','num-grid':'Number Grid',takeaways:'Takeaways'};
  const heading=s.heading||s.text||'(untitled)';
  const fieldsHtml=sectionFields(s,i);
  return `<div class="sec-block" id="sec-${i}">
    <div class="sec-block-hdr" onclick="toggleSec(${i})">
      <span class="sec-type-badge">${types[s.type]||s.type}</span>
      <span class="sec-heading-preview">${esc(heading.substring(0,40))}</span>
      <div class="sec-btns">
        ${i>0?`<button class="sec-btn" onclick="event.stopPropagation();moveSec(${i},-1)">↑</button>`:''}
        ${i<editSections.length-1?`<button class="sec-btn" onclick="event.stopPropagation();moveSec(${i},1)">↓</button>`:''}
        <button class="sec-btn del" onclick="event.stopPropagation();removeSec(${i})">✕</button>
      </div>
    </div>
    <div class="sec-block-body" id="sec-body-${i}">${fieldsHtml}</div>
  </div>`;
}

function sectionFields(s,i){
  if(s.type==='text') return `
    <div class="field"><label>Heading</label><input oninput="editSections[${i}].heading=this.value;updateSecPreview(${i})" value="${esc(s.heading||'')}"></div>
    <div class="field"><label>Body (HTML allowed)</label><textarea rows="5" oninput="editSections[${i}].body=this.value">${esc(s.body||'')}</textarea></div>`;
  if(s.type==='quote') return `
    <div class="field"><label>Quote text</label><textarea rows="3" oninput="editSections[${i}].text=this.value;updateSecPreview(${i})">${esc(s.text||'')}</textarea></div>
    <div class="field"><label>Author</label><input oninput="editSections[${i}].author=this.value" value="${esc(s.author||'')}"></div>`;
  if(s.type==='bullets') return `
    <div class="field"><label>Heading</label><input oninput="editSections[${i}].heading=this.value;updateSecPreview(${i})" value="${esc(s.heading||'')}"></div>
    <div class="field"><label>Items (one per line)</label>
      <textarea rows="5" oninput="editSections[${i}].items=this.value.split('\\n').filter(l=>l.trim())">${esc((s.items||[]).join('\n'))}</textarea>
    </div>`;
  if(s.type==='two-cards'){
    const c1=s.cards?.[0]||{icon:'',title:'',items:[]},c2=s.cards?.[1]||{icon:'',title:'',items:[]};
    return `
      <div class="field"><label>Heading</label><input oninput="editSections[${i}].heading=this.value;updateSecPreview(${i})" value="${esc(s.heading||'')}"></div>
      <div class="subfield">
        <div class="subfield-hdr">Card 1</div>
        <div class="field-row">
          <div class="field"><label>Icon (emoji)</label><input oninput="if(!editSections[${i}].cards)editSections[${i}].cards=[{},{}];editSections[${i}].cards[0].icon=this.value" value="${esc(c1.icon)}"></div>
          <div class="field"><label>Title</label><input oninput="if(!editSections[${i}].cards)editSections[${i}].cards=[{},{}];editSections[${i}].cards[0].title=this.value" value="${esc(c1.title)}"></div>
        </div>
        <div class="field"><label>Items (one per line)</label>
          <textarea rows="4" oninput="if(!editSections[${i}].cards)editSections[${i}].cards=[{},{}];editSections[${i}].cards[0].items=this.value.split('\\n').filter(l=>l.trim())">${esc((c1.items||[]).join('\n'))}</textarea>
        </div>
      </div>
      <div class="subfield">
        <div class="subfield-hdr">Card 2</div>
        <div class="field-row">
          <div class="field"><label>Icon (emoji)</label><input oninput="if(!editSections[${i}].cards)editSections[${i}].cards=[{},{}];editSections[${i}].cards[1].icon=this.value" value="${esc(c2.icon)}"></div>
          <div class="field"><label>Title</label><input oninput="if(!editSections[${i}].cards)editSections[${i}].cards=[{},{}];editSections[${i}].cards[1].title=this.value" value="${esc(c2.title)}"></div>
        </div>
        <div class="field"><label>Items (one per line)</label>
          <textarea rows="4" oninput="if(!editSections[${i}].cards)editSections[${i}].cards=[{},{}];editSections[${i}].cards[1].items=this.value.split('\\n').filter(l=>l.trim())">${esc((c2.items||[]).join('\n'))}</textarea>
        </div>
      </div>`;
  }
  if(s.type==='num-grid'||s.type==='takeaways') return `
    <div class="field"><label>Heading</label><input oninput="editSections[${i}].heading=this.value;updateSecPreview(${i})" value="${esc(s.heading||'')}"></div>
    <div class="field"><label>Items (format: number | title | description — one per line)</label>
      <textarea rows="6" oninput="editSections[${i}].items=this.value.split('\\n').filter(l=>l.trim()).map(l=>{const p=l.split('|');return{n:(p[0]||'').trim(),t:(p[1]||'').trim(),d:(p[2]||'').trim()}})">${esc((s.items||[]).map(x=>`${x.n}|${x.t}|${x.d}`).join('\n'))}</textarea>
      <p class="hint">Format each line as: <code>01 | Title text | Description text</code></p>
    </div>`;

/* ── KV REPEATER ── */
function addKV(prefix){
  const list=document.getElementById(prefix+'-list');
  const i=list.querySelectorAll('.kv-row').length;
  const row=document.createElement('div');row.className='kv-row';row.id=prefix+'-row-'+i;
  row.innerHTML=`<input id="${prefix}-key-${i}" placeholder="${prefix==='dm'?'Key':'Label'}"><input id="${prefix}-val-${i}" placeholder="Value"><button class="btn-rm" onclick="removeKV('${prefix}',${i})">✕</button>`;
  list.appendChild(row);
}

function removeKV(prefix,i){const row=document.getElementById(prefix+'-row-'+i)||document.querySelector(`#${prefix}-list .kv-row:nth-child(${i+1})`);if(row)row.remove();}

function getKVList(prefix){
  const rows=document.querySelectorAll(`#${prefix}-list .kv-row`);
  return Array.from(rows).map((r,i)=>({
    [prefix==='ds'?'label':'key']:(r.querySelector(`[id^="${prefix}-key-"]`)||r.querySelector('input:nth-child(1)'))?.value||'',
    val:(r.querySelector(`[id^="${prefix}-val-"]`)||r.querySelector('input:nth-child(2)'))?.value||''
  })).filter(x=>x[prefix==='ds'?'label':'key']);
}

/* ── IMAGE UPLOAD ── */
function setupImageUpload(item){
  const drop=document.getElementById('img-drop');
  if(!drop)return;
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)uploadImage(f);});
}

async function handleImgSelect(e){
  const f=e.target.files[0];if(!f)return;
  await uploadImage(f);
}

async function uploadImage(file){
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Uploading…';
  const ext=file.name.split('.').pop();
  const slug=document.getElementById('f-slug')?.value||'upload';
  const path=`${slug}-${Date.now()}.${ext}`;
  const {error}=await sb.storage.from('covers').upload(path,file,{upsert:true});
  btn.disabled=false;btn.textContent=editItem?'Save changes':'Create';
  if(error){toast('Upload failed: '+error.message,'err');return;}
  const {data:{publicUrl}}=sb.storage.from('covers').getPublicUrl(path);
  document.getElementById('f-cover').value=publicUrl;
  updateImgPreview(publicUrl);
  toast('Image uploaded ✓','ok');
}

function updateImgPreview(url){
  const img=document.getElementById('img-preview-el');
  if(!img)return;
  if(url){img.src=url;img.style.display='block';}
  else img.style.display='none';
}

/* ── SAVE ── */
async function saveItem(){
  if(PAGE_CONTENT_TABS.includes(activeTab)){savePageContent();return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Saving…';

  try{
    let result;
    if(activeTab==='experience'||activeTab==='products'){
      const navType=document.querySelector('input[name=nav]:checked')?.value||'soon';
      const data={
        slug:document.getElementById('f-slug').value.trim(),
        page:document.getElementById('f-page').value,
        title:document.getElementById('f-title').value.trim(),
        company_group:document.getElementById('f-group').value.trim(),
        group_color:document.getElementById('f-gcolor').value.trim(),
        group_meta:document.getElementById('f-gmeta').value.trim(),
        group_order:parseInt(document.getElementById('f-gorder').value)||0,
        sort_order:parseInt(document.getElementById('f-sort').value)||0,
        pill_text:document.getElementById('f-pill').value.trim(),
        panel_co:document.getElementById('f-panelco').value.trim(),
        panel_desc:document.getElementById('f-paneldesc').value.trim(),
        cover_url:document.getElementById('f-cover').value.trim(),
        bg_class:document.getElementById('f-bgclass').value.trim(),
        full_width:document.getElementById('f-fullwidth').checked,
        has_detail:navType==='detail',
        ext_link:navType==='link'?(document.getElementById('f-extlink').value.trim()):'',
        co_tag:document.getElementById('f-cotag')?.value.trim()||'',
        d_intro:document.getElementById('f-intro')?.value.trim()||'',
        d_meta:getKVList('dm'),
        d_stats:getKVList('ds'),
        d_sections:editSections,
      };
      if(editItem){result=await sb.from('projects').update(data).eq('id',editItem.id);}
      else{result=await sb.from('projects').insert(data);}
    } else if(activeTab==='cases'){
      const data={
        title:document.getElementById('f-title').value.trim(),
        tag:document.getElementById('f-tag').value.trim(),
        color_cls:document.getElementById('f-color').value,
        link:document.getElementById('f-link').value.trim(),
        sort_order:parseInt(document.getElementById('f-sort').value)||0,
      };
      if(editItem){result=await sb.from('case_studies').update(data).eq('id',editItem.id);}
      else{result=await sb.from('case_studies').insert(data);}
    } else if(activeTab==='pm'){
      const data={
        title:document.getElementById('f-title').value.trim(),
        description:document.getElementById('f-desc').value.trim(),
        icon_svg:document.getElementById('f-icon').value.trim(),
        items:getPMItems(),
        cta_label:document.getElementById('f-cta').value.trim(),
        full_width:document.getElementById('f-fullwidth').checked,
        sort_order:parseInt(document.getElementById('f-sort').value)||0,
      };
      if(editItem){result=await sb.from('pm_topics').update(data).eq('id',editItem.id);}
      else{result=await sb.from('pm_topics').insert(data);}
    }

    if(result?.error)throw result.error;
    toast('Saved successfully ✓','ok');
    closePanel();
    await loadTab(activeTab);
  }catch(e){
    toast('Error: '+e.message,'err');
  }
  btn.disabled=false;btn.textContent=editItem?'Save changes':'Create';
}

/* ── DELETE ── */
let pendingDeleteId=null;
function confirmDelete(id){
  pendingDeleteId=id;
  openEdit(id);
  setTimeout(()=>deleteItem(),0);
}

async function deleteItem(){
  if(!editItem)return;
  if(!confirm(`Delete "${editItem.title||editItem.slug||'this item'}"? This cannot be undone.`))return;
  const table=activeTab==='cases'?'case_studies':activeTab==='pm'?'pm_topics':'projects';
  const {error}=await sb.from(table).delete().eq('id',editItem.id);
  if(error){toast('Delete failed: '+error.message,'err');return;}
  toast('Deleted ✓','ok');
  closePanel();
  await loadTab(activeTab);
}
